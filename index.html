<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연안송씨 대종회</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Noto Serif KR', serif; background:#f4f1ea; }

    /* 상단 유틸 */
    .topbar {
      display:flex; justify-content:flex-end; gap:20px;
      padding:8px 20px; font-size:13px; color:#555;
      background:#f4f1ea;
    }

    /* 헤더 */
    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 20px; background:#f4f1ea;
      border-bottom:2px solid #8b5a2b;
    }

    .logo-wrap { display:flex; align-items:center; gap:15px; }

    .logo-img { height:60px; }

    .logo-text { font-size:26px; font-weight:600; }

    .search-box input {
      padding:10px; border:1px solid #ccc;
    }

    .search-box button {
      padding:10px; background:#2f5d50; color:#fff; border:none;
    }

    /* 메뉴 */
    nav { background:#2f5d50; border-bottom:3px solid #d4af37; }

    nav ul { display:flex; margin:0; padding:0; list-style:none; }

    nav li { flex:1; text-align:center; position:relative; }

    nav a {
      display:block; padding:15px;
      color:#d4af37; text-decoration:none;
    }

    nav a:hover { background:#23463c; }

    /* 메가메뉴 */
    .dropdown {
      display:none; position:absolute; left:0; top:100%;
      width:100vw; background:#f9f6ef;
      padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    .dropdown-inner {
      max-width:1200px; margin:0 auto;
      display:grid; grid-template-columns: repeat(6,1fr);
      gap:20px;
    }

    .dropdown a {
      display:block; padding:5px 0; color:#3b2f2f;
    }

    nav li:hover .dropdown { display:block; }

    /* 메인 */
    .hero { position:relative; }

    .hero img { width:100%; display:block; }

    .hero-text {
      position:absolute; right:5%; top:50%; transform:translateY(-50%);
      color:#3b2f2f; max-width:400px;
    }

    .hero-text h2 { font-size:28px; margin-bottom:10px; }

    /* 카드 */
    .section {
      padding:40px 20px;
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .card {
      background:#fffdf8;
      border:2px solid #8b5a2b;
      padding:20px; text-align:center;
      position:relative;
    }

    .card::before {
      content:"";
      position:absolute; inset:5px;
      border:1px solid #2f5d50;
    }

    .icon {
      width:80px; height:80px;
      margin:0 auto 10px;
      display:flex; align-items:center; justify-content:center;
    }

    .icon img {
      width:70px;
      height:70px;
      object-fit:contain;
    }

    /* 푸터 */
    footer {
      background:#0f3e3a; color:#d4af37;
      padding:30px 20px;
      display:flex; justify-content:space-between;
      flex-wrap:wrap;
    }

    footer div { margin-bottom:10px; }

  </style>
</head>
<body>

<div class="topbar">
  로그인 | 회원가입 | 사이트맵
</div>

<header>
  <div class="logo-wrap">
    <img src="logo.png" class="logo-img">
    <div class="logo-text">延安宋氏大宗會</div>
  </div>

  <div class="search-box">
    <input placeholder="검색어 입력">
    <button>🔍</button>
  </div>
</header>

<nav>
  <ul>
    <li>
      <a href="#">대종회 소개</a>
      <div class="dropdown">
        <div class="dropdown-inner">
          <div><a>인사말</a><a>연혁</a><a>조직도</a></div>
          <div><a>조씨의 기원</a><a>시조 소개</a></div>
        </div>
      </div>
    </li>

    <li>
      <a href="#">인터넷족보</a>
      <div class="dropdown">
        <div class="dropdown-inner">
          <div><a>족보검색</a><a>족보열람</a></div>
        </div>
      </div>
    </li>

    <li><a href="#">자료실</a></li>
    <li><a href="#">전통자료실</a></li>
    <li><a href="#">장학회</a></li>
    <li><a href="#">열린마당</a></li>
  </ul>
</nav>

<div class="hero">
  <img src="main.jpg">
  <div class="hero-text">
    <h2>뿌리를 잊지 않는 마음</h2>
    <p>미래를 여는 자랑스러운 종친회</p>
  </div>
</div>

<section class="section">
  <div class="card"><div class="icon"><img src="icons/icon1.png"></div>인터넷족보열람</div>
  <div class="card"><div class="icon"><img src="icons/icon2.png"></div>족보등재안내문</div>
  <div class="card"><div class="icon"><img src="icons/icon3.png"></div>등재신청</div>
  <div class="card"><div class="icon"><img src="icons/icon4.png"></div>신청서</div>
  <div class="card"><div class="icon"><img src="icons/icon5.png"></div>자료실</div>
  <div class="card"><div class="icon"><img src="icons/icon6.png"></div>소식</div>
</section>

<footer>
  <div>
    연안송씨 대종회<br>
    TEL: 000-0000-0000
  </div>
  <div>
    Copyright © 2026
  </div>
</footer>

</body>
</html>
